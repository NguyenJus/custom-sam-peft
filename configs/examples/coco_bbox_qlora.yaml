run:
  name: coco-bbox-qlora
  output_dir: ./runs
  seed: 42

model:
  name: facebook/sam3.1
  local_dir: models/sam3.1
  checkpoint_file: sam3.1_multiplex.pt
  gradient_checkpointing: true
  dtype: bfloat16

data:
  format: coco
  train:
    annotations: data/coco/instances_train2017.json
    images: data/coco/train2017
  val:
    annotations: data/coco/instances_val2017.json
    images: data/coco/val2017
  prompt_mode: bbox
  image_size: 1008
  augmentations:
    hflip: true
    color_jitter: 0.1
  text_prompt:
    mode: present
  normalize:
    mean: [0.5, 0.5, 0.5]
    std:  [0.5, 0.5, 0.5]

peft:
  method: qlora
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, v_proj]
  qlora:
    quant_type: nf4
    compute_dtype: bfloat16

train:
  epochs: 10
  batch_size: 1
  grad_accum_steps: 8
  optimizer: adamw8bit
  lr: 1.0e-4
  lr_schedule: cosine
  warmup_steps: 100
  max_grad_norm: 1.0
  eval_every: 500
  save_every: 1000
  # Loss-mix weights (defaults shown — uncomment to override):
  # loss:
  #   w_mask: 1.0
  #   w_box: 5.0
  #   w_obj: 1.0
  #   w_presence: 1.0
  #   focal_gamma: 2.0
  #   focal_alpha: 0.25
  #   matcher_weights:
  #     lambda_l1: 5.0
  #     lambda_giou: 2.0
  #     lambda_mask: 5.0

eval:
  metrics: [mAP, mAP_50, mAP_75, per_class_AP]
  iou_thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]

tracking:
  backend: tensorboard

export:
  merge: false

# -----------------------------------------------------------------------------
# Schema is the source of truth.
#
# Keys below without a trailing `# override:` comment are echoes of the
# pydantic schema defaults at src/custom_sam_peft/config/schema.py — they are
# included for discoverability. Keys WITH a `# override:` comment are
# deliberate divergence from the schema default, justified inline.
# -----------------------------------------------------------------------------
run:
  name: coco-text-lora
  output_dir: ./runs
  seed: 42

model:
  name: facebook/sam3.1
  local_dir: models/sam3.1
  checkpoint_file: sam3.1_multiplex.pt
  gradient_checkpointing: false  # see issue #60 — sam3 activation checkpointing fails under non-reentrant recompute
  dtype: bfloat16

data:
  format: coco
  train:
    annotations: data/coco/instances_train2017.json
    images: data/coco/train2017
  val:
    annotations: data/coco/instances_val2017.json
    images: data/coco/val2017
  prompt_mode: text
  image_size: 1008
  augmentations:
    preset: natural
    intensity: medium
  text_prompt:
    mode: present_plus_negatives
    negatives_per_image: 4
  # remove the `normalize:` block unless overriding for a non-SAM3 backbone —
  # SAM3.1's Sam3ImageProcessor returns the ImageNet stats below.
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

peft:
  method: lora
  r: 16
  alpha: 32
  dropout: 0.05
  # Knobs (defaults shown — uncomment to override):
  # scope: vision_decoder          # vision | vision_decoder | all
  # bias: none                     # none | all | lora_only
  # target_modules: [...]          # overrides scope when set

train:
  epochs: 10
  batch_size: 1
  grad_accum_steps: 8
  optimizer: auto
  learning_rate: 1.0e-4
  lr_schedule: cosine
  warmup_steps: 100
  max_grad_norm: 1.0
  eval_every: 500
  save_every: 1000
  log_every: 50
  nan_abort_after: 20
  box_hint:
    p_start: 1.0
    p_end: 0.0
    decay_steps: 5000
  loss:
    preset: natural
    class_imbalance: balanced

eval:
  iou_thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]

tracking:
  backend: tensorboard

export:
  merge: false

# esam3 starter config — text-prompt LoRA finetune on COCO-format data.
# Edit the paths in the `data:` section, then run:
#   esam3 train --config config.yaml
run:
  name: my-run
  output_dir: ./runs
  seed: 42

model:
  name: facebook/sam3.1
  local_dir: models/sam3.1
  checkpoint_file: sam3.1_multiplex.pt
  gradient_checkpointing: true
  dtype: bfloat16

data:
  format: coco
  train:
    annotations: data/train.json
    images: data/train/
  val:
    annotations: data/val.json
    images: data/val/
  prompt_mode: text
  image_size: 1008
  augmentations:
    hflip: true
    color_jitter: 0.1
  text_prompt:
    mode: present_plus_negatives
    negatives_per_image: 4
  normalize:
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]

peft:
  method: lora
  r: 16
  alpha: 32
  dropout: 0.05

train:
  epochs: 10
  batch_size: 1
  grad_accum_steps: 8
  optimizer: auto
  lr: 1.0e-4
  lr_schedule: cosine
  warmup_steps: 100
  max_grad_norm: 1.0
  eval_every: 500
  save_every: 1000
  log_every: 50
  nan_abort_after: 20
  box_hint:
    p_start: 1.0
    p_end: 0.0
    decay_steps: 5000
    early_stop_p_threshold: 0.05
  loss:
    w_mask: 1.0
    w_obj: 1.0
    w_presence: 1.0
    matcher_weights:
      lambda_mask: 5.0

eval:
  metrics: [mAP, mAP_50, mAP_75, per_class_AP]
  iou_thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]

tracking:
  backend: tensorboard

export:
  merge: false

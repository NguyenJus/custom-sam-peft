# custom-sam-peft starter config — text-prompt LoRA finetune on COCO-format data.
# Edit the paths in the `data:` section, then run:
#   custom-sam-peft train --config config.yaml
# -----------------------------------------------------------------------------
# Schema is the source of truth.
#
# Keys below without a trailing `# override:` comment are echoes of the
# pydantic schema defaults at src/custom_sam_peft/config/schema.py — they are
# included for discoverability. Keys WITH a `# override:` comment are
# deliberate divergence from the schema default, justified inline.
# -----------------------------------------------------------------------------
run:
  name: my-run
  output_dir: ./runs
  seed: 42

model:
  name: facebook/sam3.1
  local_dir: models/sam3.1
  checkpoint_file: sam3.1_multiplex.pt
  gradient_checkpointing: false  # see issue #60 — sam3 activation checkpointing fails under non-reentrant recompute
  dtype: bfloat16

data:
  format: coco
  train:
    annotations: data/train.json
    images: data/train/
  val:
    annotations: data/val.json
    images: data/val/
  # Alternatives — uncomment ONE to swap modes:
  #
  # No-val mode (remove the `val:` block entirely):
  # (just delete the val block above)
  #
  # Auto-split mode (carve data.train into train+val):
  # val_split:
  #   fraction: 0.1
  #   seed: null   # null → inherit run.seed at resolve time
  prompt_mode: text
  image_size: 1008
  augmentations:
    preset: ${preset}
    intensity: ${intensity}
    ${overrides_block}
  text_prompt:
    mode: present_plus_negatives
    negatives_per_image: 4
  # remove the `normalize:` block unless overriding for a non-SAM3 backbone —
  # SAM3.1's Sam3ImageProcessor returns the ImageNet stats below.
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

peft:
  method: lora
  r: 16
  alpha: 32
  dropout: 0.05

train:
  epochs: 10
  batch_size: 1
  grad_accum_steps: 8
  optimizer: auto
  learning_rate: 1.0e-4
  lr_schedule: cosine
  warmup_steps: 100
  max_grad_norm: 1.0
  eval_every: 500
  save_every: 1000
  log_every: 50
  nan_abort_after: 20
  box_hint:
    p_start: 1.0
    p_end: 0.0
    decay_steps: 5000
  loss:
    w_mask: 1.0
    w_obj: 1.0
    w_presence: 1.0
    matcher_weights:
      lambda_mask: 5.0

eval:
  iou_thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]

tracking:
  backend: tensorboard

export:
  merge: false

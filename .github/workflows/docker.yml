name: Docker

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5             # v4.3.1

      # The full CUDA torch + transformers + datasets dependency set plus the
      # loaded smoke image and gha cache export overflow the ~14 GB free on
      # ubuntu-latest. Reclaim space by dropping preinstalled toolchains we
      # don't use (kept as an inline step to preserve the SHA-pinned-actions
      # security posture). See issue #166.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
                      /usr/local/lib/android /usr/local/share/boost \
                      /usr/share/swift "${AGENT_TOOLSDIRECTORY}"
          sudo docker image prune --all --force
          df -h /

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee             # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9       # v6.1.0
        with:
          images: ghcr.io/nguyenjus/custom-sam-peft
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest

      - id: strip-v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf   # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: ghcr.io/nguyenjus/custom-sam-peft:ci-smoke
          build-args: |
            HATCH_VCS_PRETEND_VERSION_FOR_CUSTOM_SAM_PEFT=${{ steps.strip-v.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (CLI resolves, package imports)
        run: |
          docker run --rm ghcr.io/nguyenjus/custom-sam-peft:ci-smoke --help
          docker run --rm ghcr.io/nguyenjus/custom-sam-peft:ci-smoke doctor --json

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf   # v6.19.2 (same action, second use)
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HATCH_VCS_PRETEND_VERSION_FOR_CUSTOM_SAM_PEFT=${{ steps.strip-v.outputs.version }}
          cache-from: type=gha

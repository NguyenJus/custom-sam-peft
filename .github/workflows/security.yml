name: Security

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd             # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b           # v8.1.0
        with:
          enable-cache: true

      - name: Set Python version
        run: uv python install 3.13

      - name: Install deps
        # cu130 and gpu-pascal are declared-conflicting extras (different torch
        # builds), so --all-extras can't resolve. Install every extra except
        # gpu-pascal (the local-Pascal cu118 build).
        run: uv sync --extra dev --extra cu130 --extra qlora --extra wandb --extra tensorboard --extra jupyter

      - name: pip-audit
        # Ignored advisories have no fix version available as of 2026-05-21
        # (markdown / torch / transformers). Remove an ID once `uv lock --upgrade`
        # resolves it.
        run: |
          uv run --with pip-audit pip-audit --skip-editable \
            --ignore-vuln PYSEC-2026-89 \
            --ignore-vuln PYSEC-2025-189 \
            --ignore-vuln PYSEC-2025-190 \
            --ignore-vuln PYSEC-2025-191 \
            --ignore-vuln PYSEC-2025-192 \
            --ignore-vuln PYSEC-2025-193 \
            --ignore-vuln PYSEC-2025-194 \
            --ignore-vuln PYSEC-2025-195 \
            --ignore-vuln PYSEC-2025-196 \
            --ignore-vuln PYSEC-2025-197 \
            --ignore-vuln PYSEC-2025-210 \
            --ignore-vuln PYSEC-2026-139 \
            --ignore-vuln PYSEC-2025-211 \
            --ignore-vuln PYSEC-2025-212 \
            --ignore-vuln PYSEC-2025-213 \
            --ignore-vuln PYSEC-2025-214 \
            --ignore-vuln PYSEC-2025-215 \
            --ignore-vuln PYSEC-2025-216 \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln PYSEC-2025-218

  gitleaks:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (PR — full history)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd             # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout (push — shallow)
        if: github.event_name != 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd             # v6.0.2

      - name: Download gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
          # SHA-256 of gitleaks_${VERSION}_linux_x64.tar.gz from the upstream release page.
          # Verified against upstream checksums.txt and locally recomputed at plan-write time.
          # Dependabot's github-actions ecosystem does not bump non-Action versions, so any
          # future GITLEAKS_VERSION bump is a manual edit that also rotates this hash.
          GITLEAKS_SHA256: "5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
        run: |
          set -euo pipefail
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks

      - name: gitleaks (PR — full)
        if: github.event_name == 'pull_request'
        run: ./gitleaks detect --no-banner --redact --verbose --config .config/gitleaks.toml

      - name: gitleaks (push — range)
        if: github.event_name != 'pull_request'
        run: ./gitleaks detect --no-banner --redact --verbose --config .config/gitleaks.toml --log-opts "${{ github.event.before }}..${{ github.sha }}"

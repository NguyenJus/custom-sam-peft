name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd             # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b           # v8.1.0
        with:
          enable-cache: true

      - name: Set Python version
        run: uv python install 3.13

      - name: Install deps
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Type check
        run: uv run mypy src/custom_sam_peft

      - name: Test
        run: uv run pytest

      - name: Upload coverage HTML
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a      # v7.0.1
        if: always()
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 3

  lock-check:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd             # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b           # v8.1.0
        with:
          enable-cache: true

      - name: uv lock --check
        run: uv lock --check

  lint-hygiene:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd             # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b           # v8.1.0
        with:
          enable-cache: true

      - name: Install actionlint
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7

      - name: actionlint
        run: ./actionlint -color

      - name: yamllint
        run: uv run --with yamllint yamllint -c .config/yamllint.yml .

      - name: markdownlint
        run: npx --yes markdownlint-cli2 --config .config/markdownlint-cli2.jsonc "**/*.md" "#node_modules"

      - name: shellcheck
        run: shellcheck scripts/*.sh

  gpu-deselect-check:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd             # v6.0.2

      - name: Fail if scripts/run_gpu_tests.sh contains stray --deselect
        # The --deselect convention is documented in the script's header.
        # Operators add --deselect flags as tests pass on real GPU hardware;
        # the FINAL all-green pass strips all such flags. This check enforces
        # that no flags remain at merge time. Grep ignores pure-comment lines
        # so the convention doc in the script's header doesn't self-trip.
        run: |
          set -euo pipefail
          if grep -nE -- '(^|[[:space:]])--deselect([[:space:]]|=)' scripts/run_gpu_tests.sh \
              | grep -v "^[^:]*:[[:space:]]*#"; then
            echo "ERROR: scripts/run_gpu_tests.sh contains a non-comment --deselect flag." >&2
            echo "Strip it and re-run the full GPU suite before merging." >&2
            exit 1
          fi
          echo "OK: no stray --deselect flags."

name: Re-author Dependabot commits

# Dependabot commits land authored by `dependabot[bot]` and often carry
# `Co-authored-by: Claude`, `Co-authored-by: dependabot`, and
# `Signed-off-by: dependabot` trailers. Left alone these leak into the repo's
# contributors graph. This workflow rewrites every commit on a Dependabot PR
# branch to be authored by the repo owner and strips those trailers, then
# force-pushes the branch — and finally enables **rebase** auto-merge.
#
# IMPORTANT — why rebase, NOT squash:
#   A squash-merge stamps the merge commit's author with the *PR author*
#   (`dependabot[bot]`), regardless of how the branch commits are authored.
#   Re-authoring the branch therefore CANNOT survive a squash — the bot
#   reappears in the contributors graph. A rebase-merge instead replays the
#   branch commits verbatim, preserving the re-authored owner as the author
#   (committer becomes the merging PAT owner). So Dependabot PRs must be
#   rebase-merged. This job enables rebase auto-merge so that happens
#   automatically once required checks pass. Never squash a Dependabot PR.
#
# IMPORTANT — secret placement:
#   Workflows triggered by Dependabot receive *Dependabot* secrets, NOT Actions
#   secrets. Add the PAT under Settings -> Secrets and variables -> Dependabot
#   as `REAUTHOR_PAT` (a fine-grained PAT with `contents: write` AND
#   `pull-requests: write` on this repo — PR write is needed to enable
#   auto-merge below). An Actions-scoped secret of the same name will be empty
#   in this context.
#
# IMPORTANT — why a PAT, not GITHUB_TOKEN:
#   `main`'s ruleset requires status checks. A push made with the default
#   GITHUB_TOKEN does not re-trigger those checks, so the PR could never become
#   mergeable. A real user PAT does re-trigger them.
#
# Repo settings this relies on (Settings -> General -> Pull Requests):
#   "Allow rebase merging" and "Allow auto-merge" must both be enabled.

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  reauthor:
    # Only Dependabot-opened PRs. The force-push below is performed by the PAT
    # owner, so its resulting `synchronize` event carries a non-Dependabot actor
    # and is skipped here — no self-trigger loop.
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.REAUTHOR_PAT }}

      - name: Rewrite author and strip bot trailers
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          AUTHOR_NAME: NguyenJus
          AUTHOR_EMAIL: justintnguyen64@gmail.com
        run: |
          set -euo pipefail

          orig="$(git rev-parse HEAD)"

          FILTER_BRANCH_SQUELCH_WARNING=1 git filter-branch -f \
            --env-filter '
              export GIT_AUTHOR_NAME="$AUTHOR_NAME"
              export GIT_AUTHOR_EMAIL="$AUTHOR_EMAIL"
              export GIT_COMMITTER_NAME="$AUTHOR_NAME"
              export GIT_COMMITTER_EMAIL="$AUTHOR_EMAIL"
            ' \
            --msg-filter '
              grep -viE "^(Co-authored-by:.*(claude|dependabot)|Signed-off-by:.*dependabot)" || true
            ' \
            -- "${BASE_SHA}..HEAD"

          new="$(git rev-parse HEAD)"
          if [ "$orig" = "$new" ]; then
            echo "Already clean — nothing to rewrite."
          else
            echo "Rewrote ${orig} -> ${new}; force-pushing ${HEAD_REF}."
            git push --force-with-lease="${HEAD_REF}:${orig}" origin "HEAD:${HEAD_REF}"
          fi

      - name: Enable rebase auto-merge
        # Rebase (not squash) so the re-authored owner survives onto main. Merges
        # automatically once required checks pass; the merge is performed by the
        # PAT owner, keeping the bot out of both author and committer fields.
        env:
          GH_TOKEN: ${{ secrets.REAUTHOR_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --rebase --auto "$PR_URL"
